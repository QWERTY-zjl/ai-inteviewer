<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>错题本</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;font-family:Microsoft YaHei;background:linear-gradient(135deg,#0a0f1e,#141b33);color:#fff;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 20px}
h1{font-size:2rem;margin-bottom:30px;background:linear-gradient(135deg,#63b3ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cards{display:flex;gap:20px;margin-bottom:30px}
.card{flex:1;background:rgba(20,25,50,.8);backdrop-filter:blur(20px);border:1px solid rgba(100,180,255,.15);border-radius:16px;padding:24px;text-align:center}
.card h3{color:rgba(220,235,255,.5);font-size:.85rem;margin-bottom:8px}
.card .n{font-size:2.2rem;font-weight:700;color:#63b3ff}
.card .n.g{color:#4ade80}
.items{display:flex;flex-direction:column;gap:16px}
.item{background:rgba(20,25,50,.85);border:1px solid rgba(100,180,255,.15);border-radius:20px;padding:28px}
.item .q{font-size:1.1rem;margin-bottom:16px;line-height:1.6}
.item .a{background:rgba(255,107,107,.1);border-left:3px solid #ff6b6b;padding:12px 16px;border-radius:0 10px 10px 0;margin-bottom:12px}
.item .a p{color:rgba(220,235,255,.5);font-size:.85rem;margin-bottom:4px}
.item .a span{color:rgba(255,255,255,.9)}
.meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.score{padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:600}
.msg{text-align:center;padding:80px 20px;color:rgba(220,235,255,.5)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wrap">
<a href="/admin.html" style="display:inline-block;margin-bottom:20px;color:#63b3ff;text-decoration:none">← 返回管理后台</a>
<h1>我的错题本</h1>
<div id="s" class="cards" style="display:none">
<div class="card"><h3>错题数量</h3><div class="n" id="tc">0</div></div>
<div class="card"><h3>已掌握</h3><div class="n g" id="mc">0</div></div>
<div class="card"><h3>掌握率</h3><div class="n" id="mr">0%</div></div>
</div>
<div id="c2" class="msg">加载中...</div>
</div>
<script>
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d"),w,h,p=[];
function rz(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}
function init(){p=[];for(var i=0;i<60;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+1,dx:Math.random()*.4-.2,dy:Math.random()*.2+.05});}
function draw(){ctx.fillStyle="rgba(10,15,30,.12)";ctx.fillRect(0,0,w,h);p.forEach(function(o){o.x+=o.dx;o.y+=o.dy;if(o.x<0||o.x>w)o.dx*=-1;if(o.y<0||o.y>h)o.dy*=-1;var g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*4);g.addColorStop(0,"rgba(99,179,255,.25)");g.addColorStop(1,"rgba(99,102,241,0)");ctx.fillStyle=g;ctx.beginPath();ctx.arc(o.x,o.y,o.r*4,0,Math.PI*2);ctx.fill();});requestAnimationFrame(draw);}
addEventListener("resize",rz);rz();init();draw();
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
var uid=0;
function del(id){if(!confirm("确定删除？"))return;fetch("/api/wrong/"+id,{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:uid})}).then(r=>r.json()).then(d=>{if(d.code===0||d.status==="success"){alert("删除成功");init2();}else alert(d.msg||"失败")}).catch(function(){alert("网络错误");});}
function init2(){
  var u=JSON.parse(localStorage.getItem("currentUser")||"null");
  if(!u){location.href="/login.html";return;}
  uid=u.id;
  document.getElementById("c2").innerHTML="<p class=msg>加载中...</p>";
  document.getElementById("s").style.display="none";
  fetch("/api/wrong/list?user_id="+uid).then(r=>r.json()).then(function(d){
    var arr=d.data||[];
    if(arr.length===0){document.getElementById("c2").innerHTML="<p class=msg>暂无错题<br><small>面试得分低于60自动加入</small></p>";return;}
    var html='<div class="items">';
    arr.forEach(function(w){var s=w.best_score||w.score||0;var c=s>=60?"#4ade80":s>=40?"#fbbf24":"#ff6b6b";
      html+='<div class="item"><div class="q">'+esc(w.question_text)+'</div><div class="a"><p>我的回答</p><span>'+esc(w.user_answer||"无")+'</span></div><div class="meta"><span class="score" style="background:'+c+'">得分: '+s+'</span><span style="color:rgba(220,235,255,.5)">'+(w.created_at?new Date(w.created_at*1000).toLocaleString("zh-CN"):"")+'</span></div><div style="margin-top:16px"><a href="/interview.html?retry_id='+w.id+'" style="display:inline-block;background:linear-gradient(135deg,#6366f1,#63b3ff);color:#fff;padding:10px 24px;border-radius:12px;text-decoration:none;margin-right:10px">重新练习</a><button onclick="del('+w.id+')" style="background:rgba(255,107,107,.2);border:1px solid rgba(255,107,107,.3);color:#ff6b6b;padding:10px 20px;border-radius:12px;cursor:pointer">删除</button></div></div>';
    });
    html+='</div>';
    document.getElementById("c2").innerHTML=html;
    document.getElementById("s").style.display="flex";
    document.getElementById("tc").textContent=arr.length;
    var m=arr.filter(function(x){return(x.best_score||x.score||0)>=60}).length;
    document.getElementById("mc").textContent=m;
    document.getElementById("mr").textContent=arr.length>0?Math.round(m/arr.length*100)+"%":"0%";
  }).catch(function(){document.getElementById("c2").innerHTML="<p class=msg>加载失败</p>";});
}
document.addEventListener("DOMContentLoaded",init2);
</script>
</body>
</html>
