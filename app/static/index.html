<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户中心 - AI面试系统</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .header {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .header h1 { font-size: 24px; }
    .header .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    .header .logout-btn:hover { background: rgba(255,255,255,0.3); }
    
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0,0,0,0.3);
    }
    .card h3 {
      color: #333;
      font-size: 20px;
      margin-bottom: 10px;
    }
    .card p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .card .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    .card .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>🤖 AI智能面试系统</h1>
      <div class="user-info">
        <span>欢迎，{{ username }}</span>
        <button class="logout-btn" @click="logout">退出登录</button>
      </div>
    </div>
    
    <div class="container">
      <div class="cards">
        <div class="card" @click="goTo('interview')">
          <div class="icon">🎤</div>
          <h3>开始面试</h3>
          <p>AI智能模拟面试，助你提升求职竞争力</p>
          <span class="btn">立即开始</span>
        </div>
        
        <div class="card" @click="goTo('pricing')">
          <div class="icon">💎</div>
          <h3>套餐购买</h3>
          <p>查看最新套餐，获取更多面试次数</p>
          <span class="btn">查看套餐</span>
        </div>
        
        <div class="card" @click="goTo('history')">
          <div class="icon">📊</div>
          <h3>面试记录</h3>
          <p>查看历史面试记录和反馈报告</p>
          <span class="btn">查看记录</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue
    
    createApp({
      setup() {
        const username = ref('')
        
        onMounted(() => {
          const user = localStorage.getItem('user')
          if (user) {
            const userData = JSON.parse(user)
            username.value = userData.username || '用户'
          } else {
            // 没有登录，跳转登录页
            window.location.href = '/static/login.html'
          }
        })
        
        const logout = () => {
          localStorage.removeItem('token')
          localStorage.removeItem('user')
          window.location.href = '/static/login.html'
        }
        
        const goTo = (page) => {
          if (page === 'interview') window.location.href = '/static/pricing.html'
          else if (page === 'pricing') window.location.href = '/static/pricing.html'
          else if (page === 'history') alert('面试记录功能开发中...')
        }
        
        return { username, logout, goTo }
      }
    }).mount('#app')
  </script>
</body>
</html>
