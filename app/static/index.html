<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户中心 - AI面试系统</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding-bottom: 60px;
    }
    .header {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .header .logo { display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; }
    .header .logo i { font-size: 28px; }
    .header .logo span { font-size: 20px; font-weight: 600; }
    .header .search-box { flex: 1; max-width: 400px; margin: 0 40px; position: relative; }
    .header .search-box input { width: 100%; padding: 10px 40px 10px 16px; border: none; border-radius: 20px; background: rgba(255, 255, 255, 0.2); color: white; font-size: 14px; }
    .header .search-box input::placeholder { color: rgba(255, 255, 255, 0.7); }
    .header .search-box i { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.7); }
    .header .user-info { display: flex; align-items: center; gap: 16px; color: white; }
    .header .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255, 255, 255, 0.3); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header .user-name { font-size: 14px; }
    .header .logout-btn { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
    .header .logout-btn:hover { background: rgba(255, 255, 255, 0.3); }
    
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    
    .upload-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15); margin-bottom: 30px; }
    .upload-card .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .upload-card .card-header i { font-size: 24px; color: #667eea; }
    .upload-card .card-header h3 { color: #333; font-size: 20px; font-weight: 600; }
    .upload-card .card-desc { color: #666; font-size: 14px; margin-bottom: 30px; }
    .upload-zone { border: 2px dashed #d1d5db; border-radius: 16px; padding: 60px 40px; text-align: center; cursor: pointer; transition: all 0.3s; background: #fafafa; }
    .upload-zone:hover, .upload-zone.dragover { border-color: #667eea; background: rgba(102, 126, 234, 0.05); }
    .upload-zone i { font-size: 48px; color: #d1d5db; margin-bottom: 16px; display: block; }
    .upload-zone .upload-text { color: #666; font-size: 16px; margin-bottom: 8px; }
    .upload-zone .upload-hint { color: #999; font-size: 12px; }
    .upload-btn { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 14px 40px; border-radius: 30px; font-size: 16px; font-weight: 600; margin-top: 24px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .upload-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
    
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
    .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(0,0,0,0.15); }
    .card h3 { color: #333; font-size: 20px; margin-bottom: 10px; }
    .card p { color: #666; font-size: 14px; margin-bottom: 20px; }
    .card .btn { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; }
    .card .icon { font-size: 48px; margin-bottom: 15px; }
    
    .footer { text-align: center; padding: 20px; color: rgba(255, 255, 255, 0.7); font-size: 14px; }
      color: #333;
      font-size: 20px;
      margin-bottom: 10px;
    }
    .card p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .card .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    .card .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>🤖 AI智能面试系统</h1>
      <div class="user-info">
        <span>欢迎，{{ username }}</span>
        <button class="logout-btn" @click="logout">退出登录</button>
      </div>
    </div>
    
    <div class="container">
      <div class="upload-card">
        <div class="card-header"><i class="bi bi-cloud-upload"></i><h3>用户上传文件</h3></div>
        <p class="card-desc">上传您的简历或相关文件，AI将自动分析并生成面试问题</p>
        <div class="upload-zone" @dragover.prevent="dragOver" @dragleave="dragLeave" @drop.prevent="handleDrop" @click="triggerUpload">
          <i class="bi bi-cloud-arrow-up"></i>
          <p class="upload-text">拖拽文件到此处，或点击上传</p>
          <p class="upload-hint">支持 PDF、Word、图片格式</p>
        </div>
        <input type="file" ref="fileInput" @change="handleFileSelect" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style="display:none">
        <div class="upload-btn" @click="triggerUpload"><i class="bi bi-upload"></i> 选择文件</div>
      </div>
      
      <div class="cards">
        <div class="card" @click="goTo('interview')">
          <div class="icon">🎤</div>
          <h3>开始面试</h3>
          <p>AI智能模拟面试，助你提升求职竞争力</p>
          <span class="btn">立即开始</span>
        </div>
        
        <div class="card" @click="goTo('pricing')">
          <div class="icon">💎</div>
          <h3>套餐购买</h3>
          <p>查看最新套餐，获取更多面试次数</p>
          <span class="btn">查看套餐</span>
        </div>
        
        <div class="card" @click="goTo('history')">
          <div class="icon">📊</div>
          <h3>面试记录</h3>
          <p>查看历史面试记录和反馈报告</p>
          <span class="btn">查看记录</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue
    
    createApp({
      setup() {
        const username = ref('')
        const searchKeyword = ref('')
        const fileInput = ref(null)
        const isDragging = ref(false)
        
        onMounted(() => {
          const user = localStorage.getItem('user')
          if (user) {
            const userData = JSON.parse(user)
            username.value = userData.username || '用户'
          } else {
            window.location.href = '/static/login.html'
          }
        })
        
        const triggerUpload = () => { fileInput.value.click() }
        
        const handleFileSelect = (e) => {
          const file = e.target.files[0]
          if (file) uploadFile(file)
        }
        
        const dragOver = () => { isDragging.value = true }
        const dragLeave = () => { isDragging.value = false }
        
        const handleDrop = (e) => {
          isDragging.value = false
          const file = e.dataTransfer.files[0]
          if (file) uploadFile(file)
        }
        
        const uploadFile = async (file) => {
          const formData = new FormData()
          formData.append('file', file)
          try {
            const res = await fetch('/api/upload/resume', { method: 'POST', body: formData })
            if (res.ok) alert('上传成功')
          } catch (err) { console.error(err) }
        }
        
        const logout = () => {
          localStorage.removeItem('token')
          localStorage.removeItem('user')
          window.location.href = '/static/login.html'
        }
        
        const goTo = (page) => {
          if (page === 'interview') window.location.href = '/static/pricing.html'
          else if (page === 'pricing') window.location.href = '/static/pricing.html'
          else if (page === 'history') alert('面试记录功能开发中...')
        }
        
        return { username, searchKeyword, fileInput, isDragging, triggerUpload, handleFileSelect, dragOver, dragLeave, handleDrop, logout, goTo }
      }
    }).mount('#app')
  </script>
</body>
</html>
