<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录 - AI面试系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;font-family:Microsoft YaHei,sans-serif;overflow:hidden;background:#0a0a1a}
#l{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.c{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;min-height:100vh}
.b{background:rgba(10,10,30,0.85);backdrop-filter:blur(20px);border:1px solid rgba(0,212,255,0.3);border-radius:20px;padding:50px;width:420px}
h1{font-size:2.2rem;background:linear-gradient(135deg,#00d4ff,#7b2dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:10px}
.g{margin-bottom:22px}
.g l{display:block;color:rgba(255,255,255,0.85);margin-bottom:8px}
.i{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(0,212,255,0.3);border-radius:10px;color:#fff;font-size:1rem}
.i:focus{outline:none;border-color:#00d4ff;box-shadow:0 0 25px rgba(0,212,255,0.25)}
.bt{width:100%;padding:16px;background:linear-gradient(135deg,#7b2dff,#00d4ff);border:none;border-radius:10px;color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer}
.bt:disabled{opacity:0.6}
.r{text-align:center;margin-top:22px}
.r a{color:#00d4ff}
.e{color:#ff6b6b;text-align:center;margin-top:10px;display:none}
.f{display:inline-block;background:rgba(34,197,94,0.2);border:1px solid rgba(34,197,94,0.3);color:#4ade80;padding:5px 15px;border-radius:20px;margin-top:12px}
</style>
</head>
<body>
<canvas id="l"></canvas>
<div class="c">
<div class="b">
<h1>AI智能面试系统</h1>
<p style="text-align:center;color:rgba(255,255,255,0.6)">登录您的账号</p>
<span class="f">新用户免费体验3次面试</span>
<form id="f" style="margin-top:30px">
<div class="g"><l>用户名</l><input type="text" class="i" id="u" required></div>
<div class="g"><l>密码</l><input type="password" class="i" id="p" required></div>
<button type="submit" class="bt" id="s">登 录</button>
<p class="e" id="m"></p>
</form>
<p class="r">还没有账号？<a href="/register.html">立即注册</a></p>
</div>
</div>
<script>
var canvas=document.getElementById("l");
var ctx=canvas.getContext("2d");
var W,H,t=0,ls=[],ps=[];
function rz(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.onresize=rz;rz();
var cs=["#00d4ff","#7b2dff","#ff2d92","#00ff88"];
function rn(a,b){return Math.random()*(b-a)+a}
function ri(a){return a[Math.floor(Math.random()*a.length)]}
for(var i=0;i<60;i++){ls.push({x:rn(0,W),y:rn(0,H),a:rn(0,6.28),v:rn(2,6),ln:rn(80,230),c:ri(cs),w:rn(1,3),li:1,dy:rn(0.003,0.007),u:function(){this.x+=Math.cos(this.a)*this.v;this.y+=Math.sin(this.a)*this.v;this.li-=this.dy;if(this.li<=0||this.x<0||this.x>W||this.y<0||this.y>H){this.x=rn(0,W);this.y=rn(0,H);this.li=1}},d:function(){ctx.save();ctx.globalAlpha=this.li*0.7;ctx.strokeStyle=this.c;ctx.lineWidth=this.w;ctx.shadowColor=this.c;ctx.shadowBlur=15;ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.x-Math.cos(this.a)*this.ln,this.y-Math.sin(this.a)*this.ln);ctx.stroke();ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(this.x,this.y,2,0,6.28);ctx.fill();ctx.restore()}})}
for(var i=0;i<80;i++){ps.push({x:rn(0,W),y:rn(0,H),c:ri(cs),s:rn(1,3),vx:rn(-1,1),vy:rn(-1,1),li:1,dy:rn(0.008,0.023),u:function(){this.x+= this.vx;this.y+=this.vy;this.li-=this.dy;if(this.li<=0){this.x=rn(0,W);this.y=rn(0,H);this.li=1}},d:function(){ctx.save();ctx.globalAlpha=this.li*0.5;ctx.fillStyle=this.c;ctx.shadowColor=this.c;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,6.28);ctx.fill();ctx.restore()}})}
function an(){ctx.fillStyle="rgba(10,10,26,0.12)";ctx.fillRect(0,0,W,H);var y=(t*30)%H;ctx.save();var g=ctx.createLinearGradient(0,y-30,0,y+30);g.addColorStop(0,"transparent");g.addColorStop(0.5,"rgba(0,212,255,0.08)");g.addColorStop(1,"transparent");ctx.fillStyle=g;ctx.fillRect(0,y-30,W,60);ctx.restore();for(var i=0;i<ls.length;i++){ls[i].u();ls[i].d()}for(var i=0;i<ps.length;i++){ps[i].u();ps[i].d()}t+=0.016;requestAnimationFrame(an)}
an();
document.getElementById("f").onsubmit=function(e){e.preventDefault();var u=document.getElementById("u").value.trim();var p=document.getElementById("p").value;var s=document.getElementById("s");var m=document.getElementById("m");m.style.display="none";s.disabled=true;s.textContent="登录中...";fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})}).then(function(r){return r.json()}).then(function(d){if(d.error){m.textContent=d.error;m.style.display="block";s.disabled=false;s.textContent="登 录"}else if(d.status==="success"||d.success){localStorage.setItem("currentUser",JSON.stringify(d.user||{}));location.href="/admin.html"}else{m.textContent="登录失败";m.style.display="block";s.disabled=false;s.textContent="登 录"}}).catch(function(err){m.textContent="网络错误";m.style.display="block";s.disabled=false;s.textContent="登 录"})};
</script>
</body>
</html>
