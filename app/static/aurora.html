<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI面试</title>
<style>
*{margin:0;padding:0}
body{min-height:100vh;overflow:hidden;background:#0a0a1a;font-family:Segoe UI,sans-serif}
#aurora{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.content{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
.title{font-size:3rem;font-weight:700;background:linear-gradient(135deg,#00d4ff,#7b2dff,#ff2d92);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px;animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.upload-zone{width:100%;max-width:600px;padding:80px 50px;border:2px dashed rgba(123,45,255,0.5);border-radius:25px;background:rgba(10,10,30,0.5);backdrop-filter:blur(10px);text-align:center;cursor:pointer;transition:all .3s}
.upload-zone:hover{border-color:#00d4ff;transform:scale(1.02);box-shadow:0 0 50px rgba(0,212,255,0.3)}
.upload-icon{font-size:5rem;margin-bottom:25px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.upload-text{color:#fff;font-size:1.3rem;margin-bottom:10px}
.upload-hint{color:rgba(255,255,255,0.5)}
#fileInput{display:none}
</style>
</head>
<body>
<canvas id="aurora"></canvas>
<div class="stars" id="stars"></div>
<div class="content">
<h1 class="title">AI智能面试系统</h1>
<div class="upload-zone" id="uploadZone">
<div class="upload-icon">📄</div>
<p class="upload-text">点击或拖拽上传简历</p>
<p class="upload-hint">支持 PDF · Word · 图片格式</p>
</div>
<input type="file" id="fileInput">
</div>
<script>
const canvas=document.getElementById("aurora");
const ctx=canvas.getContext("2d");
let w,h,t=0;
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight}
window.addEventListener("resize",resize);
resize();
const colors=[[0,212,255],[123,45,255],[255,45,146],[0,255,136]];
function drawAurora(){
ctx.fillStyle="rgba(10,10,26,0.1)";
ctx.fillRect(0,0,w,h);
for(let i=0;i<5;i++){
const y=h*.3+Math.sin(t*.5+i)*h*.1;
const gradient=ctx.createLinearGradient(0,y-h*.3,0,y+h*.3);
const c=colors[i%colors.length];
const alpha=.15+Math.sin(t*.3+i*2)*.05;
gradient.addColorStop(0,"transparent");
gradient.addColorStop(.5,"rgba("+c[0]+","+c[1]+","+c[2]+","+alpha+")");
gradient.addColorStop(1,"transparent");
ctx.beginPath();
ctx.moveTo(0,y);
for(let x=0;x<=w;x+=5){
const wave=Math.sin(x*.005+t+i)*30+Math.sin(x*.01+t*2)*20;
ctx.lineTo(x,y+wave);
}
ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
ctx.fillStyle=gradient;ctx.fill();
}
t+=.02;requestAnimationFrame(drawAurora);
}
drawAurora();
const starsEl=document.getElementById("stars");
for(let i=0;i<150;i++){
const star=document.createElement("div");
star.style.cssText="position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:"+(Math.random()*.5+.5)+";left:"+Math.random()*100+"%;top:"+Math.random()*100+"%";
starsEl.appendChild(star);
}
const zone=document.getElementById("uploadZone");
const input=document.getElementById("fileInput");
zone.onclick=()=>input.click();
input.onchange=e=>{if(e.target.files[0])alert("已选择: "+e.target.files[0].name)};
<\/script>
</body>
</html>
