<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能面试系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/chart.umd.js"></script>
</head>
<body>
    <!-- 动态背景 -->
    <canvas id="particles" class="canvas-bg"></canvas>
    <div class="glow-bg"></div>
    
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="brand">AI INTERVIEW</div>
        <div class="nav-links">
            <span id="navUser" class="nav-user hidden"></span>
            <button id="btnLogout" class="nav-logout hidden" onclick="logout()">退出</button>
        </div>
    </nav>
    
    <main class="container">
        <!-- 登录界面 -->
        <div id="loginSection" class="card login-card card-glow fade-in">
            <h2>欢迎使用AI面试系统</h2>
            <div class="input-group">
                <label>用户名</label>
                <input type="text" id="username" class="input" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="password" class="input" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary btn-block" onclick="login()">登 录</button>
            <p style="margin-top:1.5rem;color:var(--muted)">
                还没有账号？<a class="link" onclick="showRegister()">立即注册</a>
            </p>
        </div>
        
        <!-- 注册界面 -->
        <div id="registerSection" class="card login-card card-glow hidden">
            <h2>用户注册</h2>
            <div class="input-group">
                <label>用户名</label>
                <input type="text" id="regUsername" class="input" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" class="input" placeholder="请输入邮箱">
            </div>
            <div class="input-group">
                <label>手机号</label>
                <input type="tel" id="regPhone" class="input" placeholder="请输入手机号">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="regPassword" class="input" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary btn-block" onclick="register()">注 册</button>
            <p style="margin-top:1.5rem;color:var(--muted)">
                已有账号？<a class="link" onclick="showLogin()">立即登录</a>
            </p>
        </div>
        
        <!-- 简历上传 -->
        <div id="uploadSection" class="card card-glow hidden slide-up">
            <h2 style="font-family:'Orbitron',monospace;font-size:1.5rem;margin-bottom:1.5rem;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">上传简历开始面试</h2>
            <div style="border:2px dashed var(--border);border-radius:16px;padding:3rem;text-align:center;background:rgba(0,0,0,0.3)">
                <div style="font-size:3rem;margin-bottom:1rem">📄</div>
                <input type="file" id="resumeFile" class="input" accept=".pdf,.doc,.docx" style="display:none">
                <button class="btn btn-secondary" onclick="document.getElementById('resumeFile').click()">选择简历文件</button>
                <p id="fileName" style="margin-top:1rem;color:var(--muted)">支持 PDF、Word 格式</p>
            </div>
            <button class="btn btn-primary btn-block" style="margin-top:1.5rem" onclick="uploadResume()">开始AI面试</button>
        </div>
        
        <!-- 面试界面 -->
        <div id="interviewSection" class="hidden">
            <!-- 进度条 -->
            <div class="card" style="margin-bottom:2rem">
                <div class="progress-container">
                    <div class="progress-header">
                        <span>面试进度</span>
                        <span id="progressText">0/5</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill" style="width:0%"></div>
                    </div>
                </div>
            </div>
            
            <div class="grid-2">
                <!-- 左侧：视频监控 -->
                <div class="card card-glow">
                    <h3 style="font-family:'Orbitron',monospace;margin-bottom:1rem">📹 实时监控</h3>
                    <div class="video-container">
                        <video id="videoPreview" autoplay muted playsinline></video>
                        <div id="cameraOverlay" class="video-overlay">
                            <div class="icon">🎥</div>
                            <p>点击启动摄像头</p>
                            <button class="btn btn-primary" style="margin-top:1rem" onclick="startCamera()">启动摄像头</button>
                        </div>
                        <div id="recordingIndicator" class="recording-indicator hidden">
                            <span class="dot"></span>
                            <span>REC</span>
                            <span id="recTime">00:00</span>
                        </div>
                    </div>
                    <div style="display:flex;gap:1rem;margin-top:1rem">
                        <button id="btnStartRec" class="btn btn-danger" onclick="startRecording()" disabled>开始录制</button>
                        <button id="btnStopRec" class="btn btn-secondary hidden" onclick="stopRecording()">停止录制</button>
                    </div>
                </div>
                
                <!-- 表情分析 -->
                <div class="card card-glow">
                    <h3 style="font-family:'Orbitron',monospace;margin-bottom:1rem">😊 表情分析</h3>
                    <canvas id="expressionChart" style="height:150px"></canvas>
                    <div class="grid-3" style="margin-top:1rem">
                        <div class="stat-box">
                            <div class="stat-value" id="emotionScore">--</div>
                            <div class="stat-label">情绪得分</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="expressionCount">0</div>
                            <div class="stat-label">分析次数</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="avgScore">--</div>
                            <div class="stat-label">平均分</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 问题区域 -->
            <div class="question-card" style="margin:2rem 0">
                <div>
                    <span class="question-number" id="questionNum">问题 1</span>
                    <span class="question-type" id="questionType">准备中</span>
                </div>
                <p class="question-text" id="questionText">正在加载问题...</p>
                <div class="question-hint">
                    <strong>评分标准：</strong>
                    <span id="scoreStandard">--</span>
                </div>
            </div>
            
            <!-- 回答区域 -->
            <div class="card card-glow" style="margin-bottom:2rem">
                <h3 style="font-family:'Orbitron',monospace;margin-bottom:1rem">✍️ 你的回答</h3>
                <textarea id="answerText" class="input" placeholder="请输入你的回答..."></textarea>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem">
                    <span style="color:var(--muted)"><span id="charCount">0</span> 字</span>
                    <button id="btnSubmit" class="btn btn-primary" onclick="submitAnswer()" disabled>提交答案</button>
                </div>
            </div>
            
            <!-- 导航按钮 -->
            <div style="display:flex;gap:1rem;margin-bottom:2rem">
                <button id="btnPrev" class="btn btn-secondary" style="flex:1" onclick="prevQuestion()" disabled>← 上一题</button>
                <button id="btnNext" class="btn btn-secondary" style="flex:1" onclick="nextQuestion()" disabled>下一题 →</button>
            </div>
            
            <!-- 完成按钮 -->
            <div class="card" style="text-align:center">
                <button id="btnFinish" class="btn btn-success btn-lg" onclick="finishInterview()" disabled>
                    🎯 完成面试并生成报告
                </button>
            </div>
        </div>
        
        <!-- 报告界面 -->
        <div id="reportSection" class="hidden">
            <div class="report-header">
                <h1 class="report-title">面试评估报告</h1>
            </div>
            
            <div class="grid-2">
                <div class="card card-glow">
                    <h3 style="font-family:'Orbitron',monospace;margin-bottom:1rem">📊 能力雷达图</h3>
                    <div class="chart-container">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
                
                <div class="card card-glow">
                    <h3 style="font-family:'Orbitron',monospace;margin-bottom:1rem">🏆 综合评价</h3>
                    <div style="text-align:center;padding:2rem">
                        <div class="total-score" id="totalScore">--</div>
                        <div id="levelBadge"></div>
                    </div>
                    <div id="recommendation" style="text-align:center"></div>
                </div>
            </div>
            
            <div class="card card-glow" style="margin-top:2rem">
                <h3 style="font-family:'Orbitron',monospace;margin-bottom:1rem">📝 详细评价</h3>
                <div id="evaluationDetails"></div>
            </div>
            
            <div class="card card-glow" style="margin-top:2rem">
                <h3 style="font-family:'Orbitron',monospace;margin-bottom:1rem">💡 改进建议</h3>
                <div id="improvements"></div>
            </div>
            
            <div style="text-align:center;margin-top:2rem">
                <button class="btn btn-primary btn-lg" onclick="location.reload()">🔄 重新面试</button>
            </div>
        </div>
    </main>
    
    <!-- Toast提示 -->
    <div id="toast" class="toast"></div>
    
    <!-- 粒子动画 -->
    <script src="js/particles.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
